<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">Instagram</div>
            <ul class="menu">
                <li><span class="icon">🏠</span> Home</li>
                <li><span class="icon">🔍</span> Search</li>
                <li><span class="icon">🧭</span> Explore</li>
                <li><span class="icon">🎥</span> Reels</li>
                <li><span class="icon">💬</span> Messages</li>
                <li><span class="icon">❤️</span> Notifications</li>
                <li><span class="icon">➕</span> Create</li>
                <li><span class="icon">👤</span> Profile</li>
                <li><span class="icon">≡</span> More</li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Profile Header -->
            <div class="profile-header">
                <div class="profile-pic">
                    <img src="placeholder-profile.jpg" alt="Profile Picture">
                </div>
                <div class="profile-info">
                    <div class="username">
                        <h2>terylucas</h2>
                        <button class="follow-btn">Follow</button>
                        <span class="more-options">...</span>
                    </div>
                    <div class="stats">
                        <span><strong>1,258</strong> posts</span>
                        <span><strong>4M</strong> followers</span>
                        <span><strong>1,250</strong> following</span>
                    </div>
                    <div class="name">
                        <p>Terry Lucas</p>
                    </div>
                </div>
            </div>

            <!-- Stories -->
            <div class="stories">
                <div class="story">
                    <img src="placeholder-story1.jpg" alt="Story 1">
                    <p>Made Us</p>
                </div>
                <div class="story">
                    <img src="placeholder-story2.jpg" alt="Story 2">
                    <p>Lorem...</p>
                </div>
                <div class="story">
                    <img src="placeholder-story3.jpg" alt="Story 3">
                    <p>Lorem...</p>
                </div>
                <div class="story">
                    <img src="placeholder-story4.jpg" alt="Story 4">
                    <p>Lorem...</p>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <span class="active">POSTS</span>
                <span>GUIDES</span>
                <span>REELS</span>
                <span>VIDEOS</span>
                <span>TAGGED</span>
            </div>

            <!-- Posts Grid -->
            <div class="posts-grid">
                <div class="post">
                    <img src="placeholder-post1.jpg" alt="Post 1">
                </div>
                <div class="post">
                    <img src="placeholder-post2.jpg" alt="Post 2">
                </div>
                <div class="post">
                    <img src="placeholder-post3.jpg" alt="Post 3">
                </div>
                <div class="post">
                    <img src="placeholder-post4.jpg" alt="Post 4">
                </div>
                <div class="post">
                    <img src="placeholder-post5.jpg" alt="Post 5">
                </div>
                <div class="post">
                    <img src="placeholder-post6.jpg" alt="Post 6">
                </div>
            </div>
        </div>
    </div>
</body>

</html>
